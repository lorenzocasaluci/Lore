<!DOCTYPE html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Personal Trainer Lecce | Leandro Catanese Studio Personal</title><link rel='preconnect' href='https://fonts.googleapis.com'><link href='https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap' rel='stylesheet'>
<style>
:root{--orange:#FF5500;--orange-glow:rgba(255,85,0,0.3);--orange-dim:rgba(255,85,0,0.08);--bg:#080808;--bg2:#0f0f0f;--white:#f5f5f0;--gray:#888;--border:rgba(255,85,0,0.15);}*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:400;line-height:1.6;overflow-x:hidden;}
nav{position:relative;width:100%;}
.hero{position:relative;min-height:100vh;display:flex;align-items:center;background-image:url('IMG_2461.jpeg');background-size:cover;background-position:center;overflow:hidden;}
.hero-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.7);}
.hero-content{position:relative;z-index:1;padding:40px;}
.chi-sono{padding:80px 40px;}
.chi-sono-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
.chi-sono-img{height:500px;border:2px solid #FF5500;border-radius:0;overflow:hidden;}
.chi-sono-img img{width:100%;height:100%;object-fit:cover;border-radius:0;display:block;}
@media(max-width:768px){
  .chi-sono{padding:60px 20px;}
  .chi-sono-grid{grid-template-columns:1fr;}
}
</style></head><body>

<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p>Hero</p>
  </div>
</section>

<section class="chi-sono" id="chi-sono">
  <div class="chi-sono-grid">
    <div class="chi-sono-img">
      <img src="IMG_2460.jpeg" alt="Leandro Catanese Personal Trainer Lecce">
    </div>
    <div class="chi-sono-text">
      <p>Chi sono</p>
    </div>
  </div>
</section>

</body></html>
